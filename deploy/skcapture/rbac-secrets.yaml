# deploy/skcapture/rbac-secrets.yaml — OPT-IN elevated RBAC for secret/configmap capture.
#
# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║  Apply this file ONLY if you intend to capture Secret and/or ConfigMap DATA. ║
# ║  The default install (rbac.yaml alone) cannot read Secrets at all.           ║
# ║  You must ALSO pass the corresponding flags to the binary:                   ║
# ║    --include-secret-data      → enables reading Secret .data values          ║
# ║    --include-configmap-data   → enables reading ConfigMap .data values       ║
# ║  Without both the RBAC grant AND the flag, capture is a no-op for that type. ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝
#
# Security guidance:
#   - Apply only in clusters where the SE has explicit written approval to capture credentials.
#   - Rotate or revoke the skcapture ServiceAccount token after the capture job completes.
#   - The encrypted output file (capture.age) is the only artifact that leaves the cluster.
#
# Apply:
#   kubectl apply -f deploy/skcapture/rbac.yaml         # base (always required)
#   kubectl apply -f deploy/skcapture/rbac-secrets.yaml  # secrets opt-in

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: skcapture-secrets-reader
  labels:
    app.kubernetes.io/name: skcapture
    app.kubernetes.io/component: capture-secrets
  annotations:
    synthkit.io/purpose: "Opt-in: read Secret and ConfigMap data. Apply only with --include-secret-data / --include-configmap-data."
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: skcapture-secrets-reader
  labels:
    app.kubernetes.io/name: skcapture
    app.kubernetes.io/component: capture-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: skcapture-secrets-reader
subjects:
  - kind: ServiceAccount
    name: skcapture
    namespace: skcapture

version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  exclusions:
    rules:
      # Test helpers and fakes intentionally ignore errors that cannot meaningfully fail in-test;
      # keep errcheck strict on production code only.
      - path: _test\.go
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
run:
  timeout: 5m

---
# Codacy configuration — file exclusions for Cloud analysis.
# File exclusions cannot be imported via the API; Codacy Cloud reads this file
# from the default branch. See https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# docs/**        — MkDocs / scratch docs; not application code.
# test/** + *_test.go — Go test/e2e harness: deliberately exercises internal HTTP,
#                  exec.Command and cleartext URLs, so SAST flags there are false positives.
#                  Production Go retains full security-pattern coverage.
# vendor/**      — vendored third-party Go (none today under Go modules; kept for
#                  convention parity across repos and to cover future `go mod vendor`).
# **/*.pb.go     — protoc-generated Go (profile/types/push .pb.go); machine-generated,
#                  not hand-maintained, so linter findings there are pure noise.
exclude_paths:
  - "docs/**"
  - "test/**"
  - "**/*_test.go"
  - "vendor/**"
  - "**/*.pb.go"

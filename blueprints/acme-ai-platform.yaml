    cluster: { type: eks, name: acme-eks-prd, node_groups: [{ name: general, instance_type: m7g.2xlarge, desired: 8 }], k8s_monitoring: *k8sm, addons: *addons }   # prod tier: 8 Graviton nodes
    databases:
      - { engine: postgres, version: "17.7", name: acme-aurora-prd, instance_class: db.r6g.large, observability: *obs_dbo11y }
      - { engine: docdb,    name: acme-docdb-prd, observability: *obs_cw_only }

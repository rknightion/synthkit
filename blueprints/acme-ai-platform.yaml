# acme-ai-platform — the API-poll reality of an AI assistant estate across 7 environments.
#
# Realigned 2026-06-18 to the LOCKED architecture, validated against a representative enterprise
# AI-assistant estate. Customer identity (env names, accounts,
# workspace, use_cases, agents, projects, deployment names) lives ONLY here — the catalogue is generic.
#
# Load-bearing correction (design note): Acme AI's OWN AWS accounts run Bedrock AgentCore (agent
# compute) + Bedrock Data Automation ONLY — there is NO Bedrock model inference in-account (no
# bedrock:InvokeModel, no aws_bedrock_* model resources, no invocation-logging, no WORM bucket). Every
# LLM call routes through the Portkey gateway to the AI evaluation platform's account. So this blueprint
# emits NO bedrock CloudWatch lane; the AWS-native AI surface is AgentCore-vended metrics (7 runtimes)
# only. The LLM model layer is observed via the Portkey ANALYTICS poller (portkey_api_* gauges) + a
# LangSmith eval bridge — NOT a connected gateway trace (the gen_ai trace is modelled in-process on
# each backend).
#
# Estate (design note): EKS clusters acme-eks-<env> in us-west-2; 8 standing deployments across
# 5 namespaces; 7 AgentCore runtimes; DocumentDB + OpenSearch Serverless + Aurora PostgreSQL + Neptune
# + Redis. Modelled as FOUR request-journey app workloads (authoring / live-assist / data-analysis /
# document-extraction), each fanned per-env. Shared backends are a real pod in their owning journey +
# `external: true` (trace hop, no pod) elsewhere; managed data stores are `external: true` everywhere
# (never pods).
name: acme-ai-platform
label: acme-ai-platform
metadata:                          # optional, UI-only annotation — never affects emission
  description: "The API-poll reality of an AI assistant estate across 7 us-west-2 environments: AgentCore-vended AWS metrics (7 runtimes, NO Bedrock model inference), the LLM gateway observed via the Portkey analytics poller (portkey_api_*) + a LangSmith eval bridge (no connected gateway trace). Full traced estate: 8 EKS deployments across 5 namespaces over 4 request journeys."
  owner: ai-platform
  category: scenario
  tags: [ai, llm, portkey, langsmith, agentcore, multi-env, follow-the-sun]
  links:
    architecture: ./ARCHITECTURE.md
    genai-signals: ./signals/genai.md
    portkey-signals: ./signals/portkey.md

# Follow-the-sun TRAFFIC origins (timezone-blended diurnal curve) — independent of the infra region
# (every env runs in us-west-2). Weights normalised across the three.
regions:
  - { name: eu-central-1,    timezone: Europe/Zurich,       weight: 0.6 }
  - { name: us-east-1,       timezone: America/New_York,    weight: 0.3 }
  - { name: ap-southeast-1,  timezone: Asia/Singapore,      weight: 0.1 }

# Shared per-env config is defined as YAML anchors on DEV1's real fields (the Decl struct strict-decodes,
# so anchors must live on actual keys, not a synthetic container): the 7 AgentCore runtimes — the
# dimension_Name values on aws_bedrock_agentcore_* resource-usage; there is NO `bedrock:` block, Acme AI
# runs no Bedrock model inference in-account; &k8sm, &addons, &ngdev, &obs_dbo11y, &obs_cw_only.
#
# Per-env databases (design note): Aurora PostgreSQL 17.7 (collaborative editor collab + comments store);
# DocumentDB cluster (the app document/template/session store, dbs: knowledge_layer/acme_live_assistant/
# acme_data_analysis/acme_document_extraction_db); Neptune graph (provisioned, not in the request path).
# OpenSearch Serverless is declared via `cloud.aoss`. Redis (ElastiCache) via `caches:` — collaborative editor
# session/pubsub.
environments:
  - name: DEV1
    weight: 0.2
    cloud: { provider: aws, account_id: "111122223331", region: us-west-2, vpc_id: vpc-0acme00001, nat_gateways: 1, aoss: {},
             agentcore: { agents: [contentgen, datagen, doc_annotate, doc_generate, doc_classify, doc_tools, assistant], sub_signals: [runtime, resource_usage, usage_logs] } }   # usage_logs = source=agentcore_usage Loki lane; the 7 AgentCore runtimes (inlined per-env — construct-config nodes can't carry cross-subtree YAML aliases)
    cluster:
      type: eks
      name: acme-eks-dev1
      node_groups: &ngdev [{ name: general, instance_type: m7g.2xlarge, desired: 3 }]   # dev tier: Graviton, pinned 3 nodes
      k8s_monitoring: &k8sm { enabled: true, chart_version: "4.1.4", alloy: true, features: { cluster_metrics: true, cluster_events: true, pod_logs: true, node_logs: true, application_observability: true } }   # full Alloy collector set (cost/power deliberately OFF)
      addons: &addons [core_dns, vpc_cni, ebs_csi, cert_manager, alloy_health, karpenter, argocd, envoy_gateway, external_dns, load_balancer_controller]
    databases:
      - { engine: postgres, version: "17.7", name: acme-aurora-dev1, instance_class: db.r6g.large, observability: &obs_dbo11y { cloudwatch: true, dbo11y: true, digests: 30 } }   # Aurora PG: aws_rds_* CW + dbo11y pg_stat_statements
      - { engine: docdb,    name: acme-docdb-dev1, observability: &obs_cw_only { cloudwatch: true, dbo11y: false } }   # docdb/neptune: CloudWatch lane only
      - { engine: neptune,  name: acme-neptune-dev1,       observability: *obs_cw_only }
    caches:
      - { engine: redis, version: "7.1", name: acme-redis-dev1 }

  - name: BVE
    weight: 0.2
    cloud: { provider: aws, account_id: "111122223332", region: us-west-2, vpc_id: vpc-0acme00002, nat_gateways: 1, aoss: {}, agentcore: { agents: [contentgen, datagen, doc_annotate, doc_generate, doc_classify, doc_tools, assistant], sub_signals: [runtime, resource_usage, usage_logs] } }
    cluster: { type: eks, name: acme-eks-bve, node_groups: *ngdev, k8s_monitoring: *k8sm, addons: *addons }
    databases:
      - { engine: postgres, version: "17.7", name: acme-aurora-bve, instance_class: db.r6g.large, observability: *obs_dbo11y }
      - { engine: docdb,    name: acme-docdb-bve, observability: *obs_cw_only }
      - { engine: neptune,  name: acme-neptune-bve,       observability: *obs_cw_only }
    caches:
      - { engine: redis, version: "7.1", name: acme-redis-bve }

  - name: DEV2
    weight: 0.2
    cloud: { provider: aws, account_id: "111122223333", region: us-west-2, vpc_id: vpc-0acme00003, nat_gateways: 1, aoss: {}, agentcore: { agents: [contentgen, datagen, doc_annotate, doc_generate, doc_classify, doc_tools, assistant], sub_signals: [runtime, resource_usage, usage_logs] } }
    cluster: { type: eks, name: acme-eks-dev2, node_groups: *ngdev, k8s_monitoring: *k8sm, addons: *addons }
    databases:
      - { engine: postgres, version: "17.7", name: acme-aurora-dev2, instance_class: db.r6g.large, observability: *obs_dbo11y }
      - { engine: docdb,    name: acme-docdb-dev2, observability: *obs_cw_only }

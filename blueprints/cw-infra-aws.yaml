# cw-infra-aws — showcase blueprint: AWS CloudWatch infrastructure estate with explicit sub-family
# toggles covering ALB/NLB/EBS/NAT/EKS/S3/Firehose/PrivateLink plus RDS & ElastiCache CW lanes.
# Schema: ARCHITECTURE.md §3. Deleting this file removes its telemetry and nothing else.
name: aws-cloudwatch-infra
label: aws-cw-estate
shape: business_hours_plateau
timezone: America/New_York
metadata:
  description: "AWS CloudWatch infrastructure showcase: full ALB/NLB/EBS/NAT/EKS/S3/Firehose/PrivateLink estate plus RDS and ElastiCache CloudWatch lanes, demonstrating every cw_infra sub-family toggle."
  owner: platform-observability
  category: reference
  tags: [aws, cloudwatch, alb, nlb, ebs, nat-gateway, s3, firehose, privatelink, rds, elasticache, infrastructure]
  links:
    architecture: ./ARCHITECTURE.md
    signals: ./SIGNALS.md

environments:
  - name: prod
    weight: 1.0
    metadata:
      description: "Single production AWS account in us-east-1."
      tags: [prod, use1]
    cloud:
      provider: aws
      account_id: "412000000001"
      region: us-east-1
      vpc_id: vpc-cwinfra01
      nat_gateways: 2              # emits aws_natgateway_* for 2 NAT GW instances on this VPC
      cloudwatch:                  # cw_infra sub-family toggles (all explicit for showcase clarity)
        albs: 3                    # 3 Application Load Balancer instances → aws_applicationelb_*
        s3_buckets: 5              # 5 S3 buckets → aws_s3_*
        firehose: true             # Firehose pipeline-health → aws_firehose_*
        nlb: true                  # Network Load Balancer → aws_networkelb_*
        ebs: true                  # EBS volumes → aws_ebs_*
        nat_gateway: true          # NAT Gateway → aws_natgateway_*
        eks: true                  # EKS control-plane → aws_eks_*
        private_link: true         # PrivateLink endpoints+services → aws_privatelink_*
    cluster:
      type: eks
      name: cwinfra-prod-use1
      node_groups:
        - { name: general, instance_type: m6i.xlarge, desired: 4, provisioner: managed, os: linux }
      k8s_monitoring:
        enabled: true
        alloy: true
        features:
          cluster_metrics: true
      observability:
        cloudwatch: true           # emit the per-node EC2 CloudWatch lane for cluster nodes
    databases:
      - engine: postgres
        version: "15"
        name: cwinfra-orders-db
        instance_class: db.r6g.large
        observability:
          cloudwatch: true         # emit aws_rds_* CloudWatch family
          dbo11y: false            # dbo11y lane off — CW-only showcase
    caches:
      - engine: redis
        version: "7"
        name: cwinfra-sessions-cache
        instance_class: cache.r6g.large
        observability:
          cloudwatch: true         # emit aws_elasticache_* CloudWatch family

# acme-ai-platform-eval — the gateway-native reality: the SAME assistant estate as
# acme-ai-platform, but with the AI evaluation gateway exposed, so the LLM call is observed as a
# CONNECTED trace.
#
# Predecessor scenario port (Spec 3). Customer identity is blueprint-only; the catalogue is generic.
#
# AI EVALUATION-MANAGED GATEWAY: the Portkey gateway runs in the AI
# evaluation platform's estate (acme-ai-eval), NOT in Acme AI's accounts — Acme AI owns no gateway clusters.
# Acme AI's clusters (acme-v2-eks-*) run only the assistant app (frontend/backend/agent-runtime).
# The "unlock" is that the AI evaluation platform GRANTS Acme AI a per-tenant slice of the
# gateway telemetry: the connected Path-B server span (so the LLM hop is one trace) + the gateway's
# app-level /metrics slice. Acme AI does NOT receive the gateway's node/runtime/k8s infra
# (eval-platform-internal).
#
# DISJOINT IDENTITY (so acme-ai-platform + acme-ai-platform-eval can run LIVE CONCURRENTLY):
# the two blueprints model the same logical customer as distinct synthetic estates.
# acme-ai-platform-eval disambiguates substrate-scoped identity that would collide with
# acme-ai-platform — clusters (acme-v2-eks-*), accounts (2222333344**), VPCs, the gateway app label
# (acme-gw), the workload (acme-gw-app), and the LangSmith projects (…-gw, since langsmith_eval is
# substrate-scoped). bedrock/agentcore are blueprint-scoped so need no token. portkey differs by
# family (acme-ai-platform poller portkey_api_* vs acme-ai-platform-eval the eval-platform-shared
# gateway /metrics request_count/llm_*).
#
# Observability shape vs acme-ai-platform: the service graph's `gateway` hop (service.name=portkey) is marked
# external (remote/managed) → it emits a connected Path-B server span + the export log INTO Acme AI's
# trace but is NOT a k8s deployment on Acme AI's cluster. The shared gateway /metrics arrive via the
# portkey_gateway integration with sub_signals=[gateway] (node_* OFF) + the LangSmith platform-health
# scrape, both fanned per-env.
name: acme-ai-platform-eval
label: acme-ai-platform-eval
metadata:                          # optional, UI-only annotation — never affects emission
  description: "The gateway-native reality: the same assistant estate as acme-ai-platform but with the AI evaluation gateway exposed, so the LLM call is observed as a CONNECTED (Path-B) trace plus the gateway's shared /metrics slice."
  owner: ai-platform
  category: scenario
  tags: [ai, llm, gateway, portkey, langsmith, bedrock, connected-trace, multi-env]
  links:
    architecture: ./ARCHITECTURE.md
    genai-signals: ./signals/genai.md
    portkey-signals: ./signals/portkey.md

